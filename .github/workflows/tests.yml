name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - run: uv venv .venv

      - run: uv pip install -e ".[dev]"

      - run: .venv/bin/pytest --tb=short
